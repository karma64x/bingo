<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bingo 3D/4D de Alimentos - Hospital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a3143, #021b29);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Partículas decorativas de fondo */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.6; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.3; }
        }

        .main-container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 25px 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.05);
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1;
        }

        .header-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 4px;
            text-shadow: 2px 2px 8px #00000060;
            background: linear-gradient(to right, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.95rem;
            margin-bottom: 18px;
            opacity: 0.9;
            letter-spacing: 0.5px;
            color: #d4e6f1;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .tab {
            padding: 12px 22px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .tab.active {
            background: linear-gradient(135deg, #ffb300, #ff8c00);
            color: #0b2b3b;
            border-color: #ffb300;
            box-shadow: 0 8px 18px rgba(255, 140, 0, 0.4);
            font-weight: 700;
        }

        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }

        /* Estilos del cartón de bingo */
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(3, auto);
            gap: 7px;
            background: #ffffff;
            padding: 12px;
            border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2), 0 12px 24px rgba(0,0,0,0.3);
            margin-bottom: 18px;
            border: 2px solid #ffb30033;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #f9f9f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.72rem;
            color: #1e3c4f;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            word-break: break-word;
            text-align: center;
            line-height: 1.2;
            padding: 3px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.08);
            position: relative;
            background: radial-gradient(circle at 50% 0%, #ffffff, #f2f2f2);
            border: 1px solid #e0e0e0;
        }
        .cell.empty {
            background: #eef2f5;
            cursor: default;
            box-shadow: none;
            border: 1px dashed #cbd5e0;
        }
        .cell.empty .empty-icon {
            font-size: 1.5rem;
            color: #b0c4d9;
            opacity: 0.7;
            transition: transform 0.3s;
        }
        .cell.marked {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            transform: scale(0.94);
            box-shadow: 0 0 18px #2ecc71cc;
            border-color: #1e8449;
            font-weight: 800;
        }
        .cell.marked::after {
            content: "✓";
            position: absolute;
            font-size: 1.3rem;
            opacity: 0.7;
            bottom: 2px;
            right: 4px;
            color: #fff;
        }

        .bingo-message {
            background: linear-gradient(135deg, #ffd700, #f0b300);
            color: #1e3c4f;
            font-size: 1.6rem;
            font-weight: 800;
            padding: 16px;
            border-radius: 20px;
            margin: 18px 0;
            display: none;
            animation: pulseBingo 1s infinite;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
        }
        @keyframes pulseBingo {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
        }

        button {
            background: linear-gradient(180deg, #ffb300 0%, #e68900 100%);
            border: none;
            color: #0b2b3b;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 22px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b85e00, 0 8px 14px rgba(0,0,0,0.25);
            transition: all 0.1s linear;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b85e00, 0 6px 10px rgba(0,0,0,0.2);
        }
        button.reset-btn {
            background: linear-gradient(180deg, #5d6d7e, #2c3e50);
            box-shadow: 0 6px 0 #1b2631, 0 8px 14px rgba(0,0,0,0.25);
            color: white;
        }
        button.reset-btn:active {
            box-shadow: 0 3px 0 #1b2631;
        }

        .counter {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            padding: 8px 20px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .warning {
            color: #ffe68f;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* Verificador */
        .checker-list {
            background: white;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
            max-height: 55vh;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.15);
            border: 2px solid #ffb30033;
            justify-content: center;
        }
        .word-chip {
            background: #e8edf2;
            color: #1e3c4f;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #d0d9e4;
        }
        .word-chip.checked {
            background: #2ecc71;
            color: white;
            text-decoration: line-through;
            box-shadow: 0 0 12px #2ecc71aa;
        }
        .checker-counter {
            color: white;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Confeti */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                top: 110%;
                transform: rotate(720deg);
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fondo -->
    <div class="bg-particles" id="bgParticles"></div>

    <div class="main-container">
        <div class="header-icon">🍽️⚕️</div>
        <h1>BINGO 3D/4D</h1>
        <div class="subtitle">Impresión de alimentos para hospitales</div>

        <div class="tabs">
            <button class="tab active" data-tab="player">🎲 Jugador</button>
            <button class="tab" data-tab="checker">📋 Verificador</button>
        </div>

        <!-- Panel del jugador -->
        <div class="panel active" id="playerPanel">
            <div class="counter">✅ Marcadas: <span id="markedCount">0</span> / 15</div>
            <div class="bingo-board" id="board"></div>
            <div class="bingo-message" id="bingoMsg">🎉 ¡BINGO! ¡Cartón completo! 🎉</div>
            <div class="button-group">
                <button id="newCardBtn">🔄 Nuevo cartón</button>
                <button id="resetMarksBtn" class="reset-btn">↩️ Reiniciar marcas</button>
            </div>
            <div class="warning">Tocá las palabras al escucharlas durante la exposición.</div>
        </div>

        <!-- Panel del verificador (compañero) -->
        <div class="panel" id="checkerPanel">
            <div class="checker-counter">🗣️ Palabras dichas: <span id="checkerCount">0</span> / 70</div>
            <div class="checker-list" id="checkerList"></div>
            <div style="margin-top: 18px;">
                <button id="resetCheckerBtn" class="reset-btn">🗑️ Reiniciar lista</button>
            </div>
            <div class="warning">Tocá cada palabra cuando la pronuncies para tacharla.</div>
        </div>
    </div>

    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        (function() {
            // Lista cronológica
            const palabrasCronologicas = [
                "potencias", "impresión", "3D", "4D", "alimentos", "Japón", "nutrición", "sushi",
                "cartuchos", "ingredientes", "vegetales", "algas", "enzimas", "fibras", "nutrientes",
                "sabores", "diseño", "salud", "adultos", "alimentación", "texturas", "mercado",
                "precisión", "crecimiento", "Estados Unidos", "carne", "liderazgo", "cocción",
                "láser", "pollo", "salmón", "humedad", "hornos", "hardware", "impresora",
                "extrusión", "Alemania", "plantas", "forma", "color", "estímulos", "ingeniería",
                "seguridad", "automatización", "limpieza", "Países Bajos", "azúcar", "geometrías",
                "encapsulación", "cocinas", "proteínas", "México", "aplicaciones", "hospitalidad",
                "gubernamental", "restaurantero", "Brasil", "software", "simulación", "segmentación",
                "hospitales", "tomografía", "modelos", "planificación", "quirúrgica", "capacitación",
                "entrenamiento", "residentes", "cirugías", "insumos"
            ];

            const FILAS = 3;
            const COLUMNAS = 9;
            const PALABRAS_POR_FILA = 5;

            // Estado jugador
            let currentBoard = [];
            let marked = [];
            let boardId = "";
            // Estado verificador
            let palabrasDichas = new Array(palabrasCronologicas.length).fill(false);

            // DOM
            const tabs = document.querySelectorAll('.tab');
            const panels = document.querySelectorAll('.panel');
            const boardEl = document.getElementById('board');
            const markedCountEl = document.getElementById('markedCount');
            const bingoMsgEl = document.getElementById('bingoMsg');
            const newCardBtn = document.getElementById('newCardBtn');
            const resetMarksBtn = document.getElementById('resetMarksBtn');
            const confettiContainer = document.getElementById('confettiContainer');
            const checkerListEl = document.getElementById('checkerList');
            const checkerCountEl = document.getElementById('checkerCount');
            const resetCheckerBtn = document.getElementById('resetCheckerBtn');

            // Cambio de pestañas
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    panels.forEach(p => p.classList.remove('active'));
                    document.getElementById(target === 'player' ? 'playerPanel' : 'checkerPanel').classList.add('active');
                    if (target === 'checker') renderChecker();
                });
            });

            // Generar cartón aleatorio
            function generarCarton() {
                const carton = new Array(FILAS * COLUMNAS).fill("");
                const palabrasDisponibles = [...palabrasCronologicas];
                for (let i = palabrasDisponibles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [palabrasDisponibles[i], palabrasDisponibles[j]] = [palabrasDisponibles[j], palabrasDisponibles[i]];
                }
                let idxPalabra = 0;
                for (let fila = 0; fila < FILAS; fila++) {
                    const posiciones = [];
                    while (posiciones.length < PALABRAS_POR_FILA) {
                        const col = Math.floor(Math.random() * COLUMNAS);
                        if (!posiciones.includes(col)) posiciones.push(col);
                    }
                    posiciones.sort((a, b) => a - b);
                    for (let col of posiciones) {
                        const index = fila * COLUMNAS + col;
                        carton[index] = palabrasDisponibles[idxPalabra];
                        idxPalabra++;
                    }
                }
                return carton;
            }

            function generarBoardId(board) { return board.join('|'); }

            // Persistencia jugador
            function guardarEstadoJugador() {
                localStorage.setItem('bingo3d4d_jugador', JSON.stringify({ board: currentBoard, marked, id: boardId }));
            }
            function cargarEstadoJugador() {
                const data = localStorage.getItem('bingo3d4d_jugador');
                if (data) {
                    try {
                        const estado = JSON.parse(data);
                        if (estado.board && estado.board.length === FILAS*COLUMNAS && estado.marked && estado.marked.length === FILAS*COLUMNAS) {
                            currentBoard = estado.board;
                            marked = estado.marked;
                            boardId = estado.id || generarBoardId(currentBoard);
                            return true;
                        }
                    } catch(e){}
                }
                return false;
            }

            function renderBoard() {
                boardEl.innerHTML = '';
                for (let i = 0; i < currentBoard.length; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (currentBoard[i] === '') {
                        cell.classList.add('empty');
                        cell.innerHTML = '<span class="empty-icon">⚕️</span>';
                    } else {
                        cell.textContent = currentBoard[i];
                        if (marked[i]) cell.classList.add('marked');
                        cell.addEventListener('click', () => toggleMark(i));
                    }
                    boardEl.appendChild(cell);
                }
                actualizarContador();
            }

            function toggleMark(index) {
                if (currentBoard[index] === '') return;
                marked[index] = !marked[index];
                const cells = boardEl.children;
                if (cells[index]) {
                    if (marked[index]) cells[index].classList.add('marked');
                    else cells[index].classList.remove('marked');
                }
                actualizarContador();
                guardarEstadoJugador();
                verificarBingo();
            }

            function actualizarContador() {
                const marcadas = marked.filter((m,i) => m && currentBoard[i] !== '').length;
                markedCountEl.textContent = marcadas;
            }

            function verificarBingo() {
                const total = FILAS * PALABRAS_POR_FILA;
                const marcadas = marked.filter((m,i) => m && currentBoard[i] !== '').length;
                if (marcadas === total) mostrarBingo();
                else bingoMsgEl.style.display = 'none';
            }

            function mostrarBingo() {
                bingoMsgEl.style.display = 'block';
                lanzarConfeti();
                setTimeout(() => { bingoMsgEl.style.display = 'none'; }, 8000);
            }

            function lanzarConfeti() {
                for (let i = 0; i < 100; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.left = Math.random() * 100 + '%';
                    piece.style.backgroundColor = `hsl(${Math.random() * 360}, 90%, 65%)`;
                    piece.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                    piece.style.animationDelay = Math.random() * 0.8 + 's';
                    piece.style.width = (Math.random() * 10 + 6) + 'px';
                    piece.style.height = (Math.random() * 10 + 6) + 'px';
                    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confettiContainer.appendChild(piece);
                    piece.addEventListener('animationend', () => piece.remove());
                }
            }

            function resetMarcasJugador() {
                marked = new Array(FILAS * COLUMNAS).fill(false);
                renderBoard();
                guardarEstadoJugador();
                bingoMsgEl.style.display = 'none';
            }

            function nuevoCarton() {
                currentBoard = generarCarton();
                marked = new Array(FILAS * COLUMNAS).fill(false);
                boardId = generarBoardId(currentBoard);
                renderBoard();
                guardarEstadoJugador();
                bingoMsgEl.style.display = 'none';
                confettiContainer.innerHTML = '';
            }

            // Verificador
            function cargarEstadoVerificador() {
                const data = localStorage.getItem('bingo3d4d_checker');
                if (data) {
                    try {
                        const arr = JSON.parse(data);
                        if (Array.isArray(arr) && arr.length === palabrasCronologicas.length) {
                            palabrasDichas = arr;
                            return true;
                        }
                    } catch(e){}
                }
                return false;
            }
            function guardarEstadoVerificador() {
                localStorage.setItem('bingo3d4d_checker', JSON.stringify(palabrasDichas));
            }

            function renderChecker() {
                checkerListEl.innerHTML = '';
                palabrasCronologicas.forEach((palabra, idx) => {
                    const chip = document.createElement('span');
                    chip.className = 'word-chip' + (palabrasDichas[idx] ? ' checked' : '');
                    chip.textContent = palabra;
                    chip.addEventListener('click', () => {
                        palabrasDichas[idx] = !palabrasDichas[idx];
                        if (palabrasDichas[idx]) chip.classList.add('checked');
                        else chip.classList.remove('checked');
                        actualizarContadorChecker();
                        guardarEstadoVerificador();
                    });
                    checkerListEl.appendChild(chip);
                });
                actualizarContadorChecker();
            }

            function actualizarContadorChecker() {
                checkerCountEl.textContent = palabrasDichas.filter(v => v).length;
            }

            function resetChecker() {
                palabrasDichas = new Array(palabrasCronologicas.length).fill(false);
                renderChecker();
                guardarEstadoVerificador();
            }

            // Inicialización
            function initJugador() {
                if (!cargarEstadoJugador()) {
                    currentBoard = generarCarton();
                    marked = new Array(FILAS * COLUMNAS).fill(false);
                    boardId = generarBoardId(currentBoard);
                    guardarEstadoJugador();
                }
                renderBoard();
                verificarBingo();
            }

            function initVerificador() {
                if (!cargarEstadoVerificador()) {
                    palabrasDichas = new Array(palabrasCronologicas.length).fill(false);
                    guardarEstadoVerificador();
                }
            }

            // Fondo de partículas decorativas
            function crearParticulas() {
                const container = document.getElementById('bgParticles');
                for (let i = 0; i < 25; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'bg-particle';
                    const size = Math.random() * 8 + 4;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.animationDuration = (Math.random() * 10 + 8) + 's';
                    particle.style.animationDelay = Math.random() * 5 + 's';
                    container.appendChild(particle);
                }
            }
            crearParticulas();

            // Eventos
            newCardBtn.addEventListener('click', nuevoCarton);
            resetMarksBtn.addEventListener('click', resetMarcasJugador);
            resetCheckerBtn.addEventListener('click', resetChecker);

            initJugador();
            initVerificador();
        })();
    </script>
</body>
</html>
